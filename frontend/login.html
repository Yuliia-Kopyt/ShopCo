<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Shop.co</title>
    <link rel="stylesheet" href="assets/styles/style.css">
</head>
<body>

<div class="auth-page">
    <div class="auth-page-content">
        <div class="auth-form active">
            <h2 data-i18n="auth.sign_in">Sign In</h2>
            <p class="auth-subtitle" data-i18n="auth.sign_in_subtitle">Welcome back! Please enter your details.</p>

            <form id="loginForm" class="auth-form-content">
                <div class="form-group">
                    <label data-i18n="auth.email_address">Email Address</label>
                    <input type="email" id="email" data-i18n="auth.enter_email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label data-i18n="auth.password">Password</label>
                    <input type="password" id="password" data-i18n="auth.enter_password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="auth-btn" data-i18n="auth.sign_in">Sign In</button>
            </form>

            <div class="auth-switch">
                <p>
                    <span data-i18n="auth.no_account">Don't have an account?</span> 
                    <a href="register.html" data-i18n="auth.sign_up">Register</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script src="assets/js/language.js"></script>
<script src="assets/js/login.js"></script>
<script src="assets/js/scripts.js"></script>
</body>
</html>
