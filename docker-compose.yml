services:

  postgres:
    image: postgres:16
    container_name: shopco_postgres

    environment:
      POSTGRES_DB: shopco_db
      POSTGRES_USER: shopco_user
      POSTGRES_PASSWORD: shopco_password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopco_user -d shopco_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: shopco_backend

    ports:
      - "8000:8000"

    depends_on:
      - postgres

    env_file:
      - ./backend/.env

    volumes:
      - ./backend:/app
      - ./frontend:/app/frontend
  pgadmin:
    image: dpage/pgadmin4
    container_name: shopco_pgadmin

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@shopco.com
      PGADMIN_DEFAULT_PASSWORD: admin

    ports:
      - "5050:80"

    depends_on:
      - postgres

volumes:
  postgres_data: